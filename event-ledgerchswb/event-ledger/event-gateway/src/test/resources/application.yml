server:
  port: 0

spring:
  application:
    name: event-gateway-test
  datasource:
    url: jdbc:h2:mem:testgatewaydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

account-service:
  base-url: http://localhost:${wiremock.server.port:8089}

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  retry:
    instances:
      accountService:
        max-attempts: 1
        wait-duration: 100ms
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
        ignore-exceptions:
          - com.eventledger.gateway.exception.AccountServiceClientException
